name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Cache Gradle libraries
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Build Debug APK
        shell: bash
        run: |
          gradle clean :app:assembleDebug --stacktrace --no-configuration-cache --warning-mode all

      - name: Build Release APK
        shell: bash
        run: |
          gradle :app:assembleRelease --stacktrace --no-configuration-cache --warning-mode all

      - name: Collect APKs
        shell: bash
        run: |
          mkdir -p output-apk
          find app/build/outputs/apk -name "*.apk" -type f -print -exec cp {} output-apk/ \;
          ls -lh output-apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: voicepro-recorder-final-v5-apks
          path: output-apk/*.apk
          if-no-files-found: error
